<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"><rect width="900" height="520" rx="24" fill="#fff"/><text x="40" y="55" font-family="Arial" font-size="34" font-weight="800" fill="#065f46">4.7 ★</text><text x="150" y="55" font-family="Arial" font-size="22" fill="#334155">EcoRide Smart EV Rentals — Google Reviews</text><g fill="#facc15"><text x="40" y="95" font-family="Arial" font-size="26">★★★★★</text></g><g font-family="Arial"><rect x="40" y="130" width="820" height="90" rx="16" fill="#f8fafc"/><circle cx="78" cy="175" r="24" fill="#0ea5e9"/><text x="70" y="184" font-size="22" fill="white" font-weight="700">A</text><text x="120" y="162" font-size="18" font-weight="700" fill="#0f172a">Ahmed Al Balushi</text><text x="120" y="190" font-size="16" fill="#475569">Affordable and reliable for university commute. The app booking was smooth.</text><rect x="40" y="240" width="820" height="90" rx="16" fill="#f8fafc"/><circle cx="78" cy="285" r="24" fill="#22c55e"/><text x="70" y="294" font-size="22" fill="white" font-weight="700">K</text><text x="120" y="272" font-size="18" font-weight="700" fill="#0f172a">Khalid Al Hinai</text><text x="120" y="300" font-size="16" fill="#475569">Clean shared electric bus and good student price.</text><rect x="40" y="350" width="820" height="90" rx="16" fill="#f8fafc"/><circle cx="78" cy="395" r="24" fill="#f97316"/><text x="71" y="404" font-size="22" fill="white" font-weight="700">F</text><text x="120" y="382" font-size="18" font-weight="700" fill="#0f172a">Fatma Al Lawati</text><text x="120" y="410" font-size="16" fill="#475569">Eco-friendly idea. More pickup points near colleges would be useful.</text></g></svg>